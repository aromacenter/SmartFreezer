<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bejelentkezés – Fagyasztó készlet</title>
<link rel="stylesheet" href="/style.css" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#16273d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Fagyasztó" />
<link rel="apple-touch-icon" href="/icons/icon-180.png" />
<link rel="icon" href="/icons/icon-192.png" />
</head>
<body>
<main style="max-width:360px;">
  <h1>❄️ Fagyasztó készlet</h1>
  <form id="loginForm">
    <label>Jelszó
      <input type="password" name="password" required autofocus />
    </label>
    <button class="submit" type="submit">Belépés</button>
    <div id="msg"></div>
  </form>
</main>
<script>
const form = document.getElementById('loginForm');
const msg = document.getElementById('msg');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.textContent = '';
  const password = new FormData(form).get('password');
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password }),
  });
  if (res.ok) {
    location.href = '/';
  } else {
    const data = await res.json().catch(() => ({}));
    msg.innerHTML = `<div class="msg error">${data.error || 'Hibás jelszó'}</div>`;
  }
});
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
}
</script>
</body>
</html>
