<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fagyasztó készlet</title>
<link rel="stylesheet" href="/style.css" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#16273d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Fagyasztó" />
<link rel="apple-touch-icon" href="/icons/icon-180.png" />
<link rel="icon" href="/icons/icon-192.png" />
</head>
<body>
<header>
  <h1>❄️ Fagyasztó készlet</h1>
  <button id="logoutBtn">Kilépés</button>
</header>
<main>
  <div class="btn-grid">
    <a class="big-btn intake" href="/intake.html"><span class="icon">📥</span>Bevételezés</a>
    <a class="big-btn outtake" href="/outtake.html"><span class="icon">📤</span>Kivételezés</a>
    <a class="big-btn catalog" href="/catalog.html"><span class="icon">📚</span>Katalógus</a>
    <a class="big-btn settings" href="/settings.html"><span class="icon">⚙️</span>Beállítások</a>
  </div>
</main>
<script>
fetch('/api/session').then(r => r.json()).then(d => { if (!d.loggedIn) location.href = '/login.html'; });
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login.html';
});
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
}
</script>
</body>
</html>
