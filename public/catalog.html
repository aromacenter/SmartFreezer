<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Katalógus – Fagyasztó készlet</title>
<link rel="stylesheet" href="/style.css" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#16273d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Fagyasztó" />
<link rel="apple-touch-icon" href="/icons/icon-180.png" />
<link rel="icon" href="/icons/icon-192.png" />
</head>
<body>
<header>
  <h1>📚 Katalógus</h1>
  <a href="/">Vissza</a>
</header>
<main>
  <div class="size-control" id="sizeControl">
    <button data-scale="0.8">Kicsi</button>
    <button data-scale="1">Közepes</button>
    <button data-scale="1.5">Nagy</button>
    <button data-scale="2">Extra nagy</button>
  </div>
  <input class="search" type="search" id="search" placeholder="Keresés név alapján…" />
  <div class="product-grid" id="grid"></div>
</main>

<div class="modal-backdrop" id="modalBackdrop" style="display:none">
  <div class="modal" style="max-width:420px">
    <h3 id="modalTitle"></h3>
    <p id="modalMeta" style="color:#9fb2cc;font-size:14px;"></p>
    <div style="display:flex; gap:10px;">
      <div style="flex:1">
        <div style="font-size:12px;color:#9fb2cc;margin-bottom:4px;">Termék fotó</div>
        <img id="modalPhotoProduct" style="width:100%;border-radius:8px;background:#0a1320;" />
      </div>
      <div style="flex:1">
        <div style="font-size:12px;color:#9fb2cc;margin-bottom:4px;">Címke fotó</div>
        <img id="modalPhotoLabel" style="width:100%;border-radius:8px;background:#0a1320;" />
      </div>
    </div>
    <div class="row">
      <button class="cancel" id="modalClose">Bezárás</button>
    </div>
  </div>
</div>

<script>
let products = [];

async function load(q = '') {
  const res = await fetch('/api/products' + (q ? `?q=${encodeURIComponent(q)}` : ''));
  products = await res.json();
  render();
}

function render() {
  const grid = document.getElementById('grid');
  if (!products.length) {
    grid.innerHTML = '<p style="color:#9fb2cc">Nincs készleten lévő tétel.</p>';
    return;
  }
  grid.innerHTML = products.map(p => `
    <div class="card" data-id="${p.id}">
      <img src="${p.photo_product ? '/uploads/' + p.photo_product : ''}" alt="${p.name}" onerror="this.style.opacity=0" />
      <div class="info">
        <div class="name">${p.name}</div>
        <div class="meta">${p.quantity} db · ${p.location || '—'}</div>
      </div>
    </div>
  `).join('');
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openModal(parseInt(card.dataset.id, 10)));
  });
}

function openModal(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = p.name;
  document.getElementById('modalMeta').textContent = `${p.quantity} db · ${p.location || '—'}`;
  document.getElementById('modalPhotoProduct').src = p.photo_product ? '/uploads/' + p.photo_product : '';
  document.getElementById('modalPhotoLabel').src = p.photo_label ? '/uploads/' + p.photo_label : '';
  document.getElementById('modalBackdrop').style.display = 'flex';
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalBackdrop').style.display = 'none';
});
document.getElementById('modalBackdrop').addEventListener('click', (e) => {
  if (e.target.id === 'modalBackdrop') e.currentTarget.style.display = 'none';
});

let searchTimer;
document.getElementById('search').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => load(e.target.value.trim()), 250);
});

function applyScale(scale) {
  document.documentElement.style.setProperty('--card-scale', scale);
  localStorage.setItem('cardScale', scale);
  document.querySelectorAll('#sizeControl button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.scale === String(scale));
  });
}
document.querySelectorAll('#sizeControl button').forEach(btn => {
  btn.addEventListener('click', () => applyScale(btn.dataset.scale));
});
applyScale(localStorage.getItem('cardScale') || '1');

fetch('/api/session').then(r => r.json()).then(d => { if (!d.loggedIn) location.href = '/login.html'; else load(); });
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
}
</script>
</body>
</html>
